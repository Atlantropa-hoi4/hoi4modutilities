name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $packageVersion = node -p "require('./package.json').version"
          if ($tag -ne "v$packageVersion") {
            throw "Release tag '$tag' does not match package.json version 'v$packageVersion'."
          }
          "RELEASE_VERSION=$packageVersion" >> $env:GITHUB_ENV

      - name: Typecheck
        run: npm run compile-ts

      - name: Build extension bundles
        run: npm run build

      - name: Run lint
        run: npm run lint

      - name: Run unit verification
        run: npm run test:unit

      - name: Run VS Code integration tests
        run: npm run test-ui

      - name: Package VSIX
        run: npm run package

      - name: Prepare release assets
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path . -Filter *.vsix | Select-Object -First 1
          if (-not $vsix) {
            throw "No VSIX package was produced."
          }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $vsix.FullName).Hash.ToLowerInvariant()
          $shaFile = "$($vsix.Name).sha256"
          Set-Content -LiteralPath $shaFile -Value "$hash *$($vsix.Name)"
          "VSIX_PATH=$($vsix.Name)" >> $env:GITHUB_ENV
          "VSIX_SHA_PATH=$shaFile" >> $env:GITHUB_ENV

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ env.VSIX_PATH }}
            ${{ env.VSIX_SHA_PATH }}
